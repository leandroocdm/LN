<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Orçamento LN</title>
    <link rel="stylesheet" href="static/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>
    <div class="container">
        <h2>Gerador de Orçamento Profissional</h2>
        <form id="orcamentoForm">
            <fieldset>
                <legend>Detalhes do Cliente</legend>
                <label for="nomeCliente">Nome do Cliente:</label>
                <input type="text" id="nomeCliente" name="nomeCliente" required><br><br>

                <div class="cpf-cnpj-selection">
                    <label>
                        <input type="radio" name="docType" value="cpfCnpj" checked> CPF/CNPJ
                    </label>
                    <label>
                        <input type="radio" name="docType" value="na"> Não informar
                    </label>
                </div>

                <div id="cpfCnpjInputContainer">
                    <label for="cpfCnpjCliente">CPF/CNPJ:</label>
                    <input type="text" id="cpfCnpjCliente" name="cpfCnpjCliente" maxlength="18" required><br><br>
                </div>
            </fieldset>

            <fieldset>
                <legend>Detalhes do Serviço</legend>
                <label for="descricaoServico">Descrição do Serviço:</label><br>
                <textarea id="descricaoServico" name="descricaoServico" rows="6" required></textarea><br><br>

                <label for="observacoes">Observações adicionais:</label><br>
                <textarea id="observacoes" name="observacoes" rows="4"></textarea><br><br>

                <label for="valorTotal">Valor Total (R$):</label>
                <input type="number" id="valorTotal" name="valorTotal" step="0.01" required><br><br>
            </fieldset>

            <button type="submit" id="gerarPdfBtn">Gerar PDF</button>
        </form>
    </div>

    <div id="pdf-template" style="position: absolute; top: 0; left: 0; width: 800px; visibility: hidden; background: white;"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('orcamentoForm');
            const gerarPdfBtn = document.getElementById('gerarPdfBtn');
            const pdfTemplateElement = document.getElementById('pdf-template');
            const PIX_DISCOUNT_RATE = 0.05;
            const CARD_MARKUP_RATE = 0.10;

            const docTypeRadios = document.querySelectorAll('input[name="docType"]');
            const cpfCnpjInputContainer = document.getElementById('cpfCnpjInputContainer');
            const cpfCnpjInput = document.getElementById('cpfCnpjCliente');

            docTypeRadios.forEach(radio => {
                radio.addEventListener('change', (event) => {
                    if (event.target.value === 'na') {
                        cpfCnpjInputContainer.style.display = 'none';
                        cpfCnpjInput.removeAttribute('required');
                        cpfCnpjInput.value = '';
                    } else {
                        cpfCnpjInputContainer.style.display = 'block';
                        cpfCnpjInput.setAttribute('required', 'required');
                    }
                });
            });

            form.addEventListener('submit', async (event) => {
                event.preventDefault();

                let cpfCnpjFormatado = '';
                const docTypeSelected = document.querySelector('input[name="docType"]:checked').value;

                if (docTypeSelected === 'cpfCnpj') {
                    cpfCnpjFormatado = cpfCnpjInput.value;
                } else {
                    cpfCnpjFormatado = 'Não informado';
                }

                gerarPdfBtn.disabled = true;
                gerarPdfBtn.textContent = 'Gerando PDF...';

                try {
                    const { jsPDF } = window.jspdf;
                    const nomeCliente = document.getElementById('nomeCliente').value;
                    const descricaoServico = document.getElementById('descricaoServico').value;
                    const observacoes = document.getElementById('observacoes').value || 'Nenhuma observação fornecida.';
                    let valorTotal = parseFloat(document.getElementById('valorTotal').value);
                    
                    if (isNaN(valorTotal)) throw new Error('Valor inválido.');
                    
                    const valorFormatado = valorTotal.toFixed(2);
                    const valorCartao = (valorTotal * (1 + CARD_MARKUP_RATE)).toFixed(2);
                    const today = new Date().toLocaleDateString('pt-BR');

                    // SEU LAYOUT ORIGINAL
                    pdfTemplateElement.innerHTML = `
                    <style>
                        .pdf-wrapper { padding: 40px; background: white; color: #333; font-family: Arial, sans-serif; }
                        .header { display: flex; justify-content: space-between; align-items: center; background-color: #f0f0f0; padding: 20px; border-radius: 5px; }
                        .company-name { font-size: 30px; font-weight: bold; color: #000; }
                        .company-details { font-size: 14px; font-weight: 700; }
                        .section-title { font-size: 16px; font-weight: bold; margin-top: 25px; text-transform: uppercase; border-bottom: 1px solid #ccc; padding-bottom: 5px; }
                        .budget-table { margin-top: 15px; background-color: #f9f9f9; padding: 15px; border-radius: 5px; min-height: 100px; white-space: pre-wrap; }
                        .payment-options { display: flex; justify-content: space-between; margin-top: 20px; gap: 10px; }
                        .payment-option { flex: 1; border: 1px solid #ddd; padding: 10px; text-align: center; background: #fff; }
                        .payment-title { font-weight: bold; margin-bottom: 5px; }
                        .payment-value { background-color: #eee; padding: 5px; font-weight: bold; margin-top: 5px; }
                        .pix-info { text-align: center; margin-top: 30px; font-weight: bold; font-size: 16px; background: #e1f5fe; padding: 15px; }
                    </style>
                    <div class="pdf-wrapper">
                        <div class="header">
                                <img src="static/img/logo.jpg" alt="Logo da Empresa" class="logo">
                            <div>
                                <div class="company-name">LN</div>
                                <div class="company-details">Climatização e elétrica</div>
                                <div class="company-details">CNPJ: 13.744.549/0001-32</div>
                                <div class="company-details">Rua Salvador Pratta, n° 460</div>
                            </div>
                            <div class="header-right">
                                    <div class="date">Data: ${today}<br> Orçamento válido por 7 dias.</div>
                                <div class="social-icons">
                                    <a href="https://wa.me/55199998629120"> <img src="static/img/ic_whatsapp.png" alt="WhatsApp"> </a>
                                    <a href="https://instagram.com/lnclimatizacaoeletrica"> <img src="static/img/ic_instagram.png" alt="Instagram"> </a>
                                </div>
                                    <div class="social-note">Toque no icone acima para ser direcionado</div>
                            </div>
                        </div>
                        <div class="section-title">Cliente</div>
                        <div style="margin-top: 10px;">
                            <strong>NOME:</strong> ${nomeCliente}<br>
                            <strong>CPF/CNPJ:</strong> ${cpfCnpjFormatado}
                        </div>
                        <div class="section-title">Descrição do Serviço</div>
                        <div class="budget-table">${descricaoServico}</div>
                        <div class="section-title">Observações</div>
                        <div style="margin-top: 10px;">${observacoes}</div>
                        <div class="section-title">Formas de Pagamento</div>
                        <div class="payment-options">
                            <div class="payment-option">
                                <div class="payment-title">À Vista</div>
                                <div class="payment-value">R$ ${valorFormatado}</div>
                            </div>
                            <div class="payment-option">
                                <div class="payment-title">Cartão (até 12x)</div>
                                <div class="payment-value">R$ ${valorCartao}</div>
                            </div>
                        </div>
                        <div class="pix-info">Chave pix: 13.744.549/0001-32</div>
                    </div>`;

                    // 1. CORREÇÃO: Espera o navegador renderizar o HTML injetado
                    await new Promise(resolve => setTimeout(resolve, 800));

                    // 2. CORREÇÃO: Captura com configurações que forçam visibilidade
                    const canvas = await html2canvas(pdfTemplateElement, {
                        scale: 2,
                        useCORS: true,
                        backgroundColor: "#ffffff",
                        onclone: (clonedDoc) => {
                            // Força o elemento a ficar visível apenas no momento do print
                            clonedDoc.getElementById('pdf-template').style.visibility = 'visible';
                        }
                    });

                    const imgData = canvas.toDataURL('image/jpeg', 0.95);
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    
                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = (canvas.height * pdfWidth) / canvas.width;

                    pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
                    pdf.save(`Orcamento_${nomeCliente}.pdf`);

                } catch (error) {
                    alert('Erro ao gerar o PDF: ' + error.message);
                } finally {
                    pdfTemplateElement.innerHTML = '';
                    gerarPdfBtn.disabled = false;
                    gerarPdfBtn.textContent = 'Gerar PDF';
                }
            });
        });
    </script>
</body>
</html>
