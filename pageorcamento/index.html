<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Orçamento Profissional</title>
    <link rel="stylesheet" href="static/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>
    <div class="container">
        <div class="logo">
            <img src="../img/logo.png" alt="logo">
            <h2>Gerador de Orçamento Profissional</h2>
        </div>
        <form id="orcamentoForm">
            <fieldset>
                <legend>Detalhes do Cliente</legend>
                <label for="nomeCliente">Nome do Cliente:</label>
                <input type="text" id="nomeCliente" required>

                <div class="cpf-cnpj-selection">
                    <label><input type="radio" name="docType" value="cpfCnpj" checked> CPF/CNPJ</label>
                    <label><input type="radio" name="docType" value="na"> Não informar</label>
                </div>

                <div id="cpfCnpjInputContainer">
                    <label for="cpfCnpjCliente">CPF/CNPJ:</label>
                    <input type="text" id="cpfCnpjCliente" maxlength="18" placeholder="000.000.000-00">
                </div>
            </fieldset>

            <fieldset>
                <legend>Detalhes do Serviço</legend>
                <label for="descricaoServico">Descrição do Serviço:</label>
                <textarea id="descricaoServico" rows="6" required></textarea>

                <label for="observacoes">Observações:</label>
                <textarea id="observacoes" rows="4"></textarea>

                <label for="valorTotal">Valor Total:</label>
                <input type="text" id="valorTotal" placeholder="R$ 0,00" required>
            </fieldset>

            <button type="submit" id="gerarPdfBtn">Gerar PDF</button>
        </form>
    </div>

    <div id="pdf-template"></div>
    <script src="script.js"></script>
</body>

</html>
