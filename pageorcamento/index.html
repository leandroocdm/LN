<!DOCTYPE html> <html lang="pt-br"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Gerador de Orçamento Profissional</title> <link rel="icon" href="/favicon.ico"> <link rel="stylesheet" href="static/styles.css"> <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script> <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script> </head> <body> <div class="container"> <div class="logo"> <img src="static/img/logo.png" alt="logo"> <h2>Gerador de Orçamento Profissional</h2> </div> <form id="orcamentoForm"> <fieldset> <legend>Detalhes do Cliente</legend> <label for="nomeCliente">Nome do Cliente:</label> <input type="text" id="nomeCliente" name="nomeCliente" required><br><br> <div class="cpf-cnpj-selection"> <label><input type="radio" name="docType" value="cpfCnpj" checked> CPF/CNPJ</label> <label><input type="radio" name="docType" value="na"> Não informar</label> </div> <div id="cpfCnpjInputContainer"> <label for="cpfCnpjCliente">CPF/CNPJ:</label> <input type="text" id="cpfCnpjCliente" maxlength="18" required><br><br> </div> </fieldset> <fieldset> <legend>Detalhes do Serviço</legend> <label for="descricaoServico">Descrição do Serviço:</label><br> <textarea id="descricaoServico" rows="6" required></textarea><br><br> <label for="observacoes">Observações adicionais:</label><br> <textarea id="observacoes" rows="4"></textarea><br><br> <label for="valorTotal">Valor Total (R$):</label> <input type="number" id="valorTotal" step="0.01" required><br><br> </fieldset> <button type="submit" id="gerarPdfBtn">Gerar PDF</button> </form> </div>
    

<div id="pdf-template" style="position: absolute; left: -9999px; width: 800px; background: white;"></div>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const form = document.getElementById('orcamentoForm');
    const gerarPdfBtn = document.getElementById('gerarPdfBtn');
    const pdfTemplateElement = document.getElementById('pdf-template');
    const inputCpf = document.getElementById('cpfCnpjCliente');
    const containerCpf = document.getElementById('cpfCnpjInputContainer');
    const docTypeRadios = document.querySelectorAll('input[name="docType"]');

    // Toggle CPF/CNPJ
    docTypeRadios.forEach(radio => {
        radio.addEventListener('change', (event) => {
            if (event.target.value === 'na') {
                containerCpf.style.display = 'none';
                inputCpf.removeAttribute('required');
                inputCpf.value = '';
            } else {
                containerCpf.style.display = 'block';
                inputCpf.setAttribute('required', 'required');
            }
        });
    });

    // Funções de Validação
    function validarCPF(cpf) {
        cpf = cpf.replace(/[^\d]+/g, '');
        if (cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) return false;
        let soma = 0, resto;
        for (let i = 1; i <= 9; i++) soma += parseInt(cpf.substring(i - 1, i)) * (11 - i);
        resto = (soma * 10) % 11;
        if (resto === 10 || resto === 11) resto = 0;
        if (resto !== parseInt(cpf.substring(9, 10))) return false;
        soma = 0;
        for (let i = 1; i <= 10; i++) soma += parseInt(cpf.substring(i - 1, i)) * (12 - i);
        resto = (soma * 10) % 11;
        if (resto === 10 || resto === 11) resto = 0;
        return resto === parseInt(cpf.substring(10, 11));
    }

    function validarCNPJ(cnpj) {
        cnpj = cnpj.replace(/[^\d]+/g, '');
        if (cnpj.length !== 14 || /^(\d)\1+$/.test(cnpj)) return false;
        let tamanho = cnpj.length - 2;
        let numeros = cnpj.substring(0, tamanho);
        let digitos = cnpj.substring(tamanho);
        let soma = 0, pos = tamanho - 7;
        for (let i = tamanho; i >= 1; i--) {
            soma += numeros.charAt(tamanho - i) * pos--;
            if (pos < 2) pos = 9;
        }
        let resultado = soma % 11 < 2 ? 0 : 11 - soma % 11;
        if (resultado != digitos.charAt(0)) return false;
        tamanho++;
        numeros = cnpj.substring(0, tamanho);
        soma = 0; pos = tamanho - 7;
        for (let i = tamanho; i >= 1; i--) {
            soma += numeros.charAt(tamanho - i) * pos--;
            if (pos < 2) pos = 9;
        }
        resultado = soma % 11 < 2 ? 0 : 11 - soma % 11;
        return resultado == digitos.charAt(1);
    }

    form.addEventListener('submit', async (event) => {
        event.preventDefault();

        // Validação antes de gerar
        const docTypeSelected = document.querySelector('input[name="docType"]:checked').value;
        let cpfCnpjFormatado = 'Não informado';

        if (docTypeSelected === 'cpfCnpj') {
            const valor = inputCpf.value;
            const somenteNumeros = valor.replace(/\D/g, '');
            if (somenteNumeros.length === 11 && !validarCPF(somenteNumeros)) {
                alert("CPF inválido!"); return;
            } else if (somenteNumeros.length === 14 && !validarCNPJ(somenteNumeros)) {
                alert("CNPJ inválido!"); return;
            }
            cpfCnpjFormatado = valor;
        }

        gerarPdfBtn.disabled = true;
        gerarPdfBtn.textContent = 'Gerando...';

        try {
            const nome = document.getElementById('nomeCliente').value;
            const desc = document.getElementById('descricaoServico').value;
            const obs = document.getElementById('observacoes').value || 'Nenhuma.';
            const valorTotal = parseFloat(document.getElementById('valorTotal').value);
            const today = new Date().toLocaleDateString('pt-BR');
            const valorCartao = (valorTotal * 1.10).toFixed(2);

            // ATENÇÃO: Usei a crase ( ` ) aqui para envolver o HTML
            pdfTemplateElement.innerHTML = `
                <style>
                    .pdf-box { padding: 40px; font-family: Arial, sans-serif; color: #333; background: white; width: 750px; }
                    .header { display: flex; justify-content: space-between; align-items: center; background-color: #f0f0f0; padding: 15px; border-radius: 5px; }
                    .header-left { display: flex; align-items: center; }
                    .header-left img { width: 80px; margin-right: 15px; }
                    .company-name { font-size: 24px; font-weight: bold; }
                    .company-details { font-size: 12px; font-weight: 700; }
                    .header-right { text-align: right; }
                    .social-icons { display: flex; justify-content: flex-end; margin-top: 10px; gap: 15px; }
                    .social-icons img { width: 25px; height: 25px; }
                    .section-title { font-size: 14px; font-weight: bold; margin-top: 25px; text-transform: uppercase; border-bottom: 1px solid #ccc; }
                    .budget-table { margin-top: 10px; background-color: #f9f9f9; padding: 15px; border-radius: 5px; white-space: pre-wrap; min-height: 80px; }
                    .payment-options { display: flex; justify-content: space-between; margin-top: 20px; gap: 10px; }
                    .payment-option { flex: 1; border: 1px solid #ddd; padding: 10px; text-align: center; }
                    .payment-value { background-color: #eee; padding: 5px; font-weight: bold; margin-top: 5px; display: block; }
                    .pix-info { text-align: center; margin-top: 30px; font-size: 16px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; }
                    .pix-logo { width: 25px; height: 25px; }
                </style>
                <div class="pdf-box">
                    <div class="header">
                        <div class="header-left">
                            <img src="static/img/logo.png" alt="Logo">
                            <div>
                                <div class="company-name">LN</div>
                                <div class="company-details">Climatização e elétrica</div>
                                <div class="company-details">CNPJ: 13.744.549/0001-32</div>
                                <div class="company-details">Salvador Pratta, 460</div>
                            </div>
                        </div>
                        <div class="header-right">
                            <div style="font-size: 12px;">Data: ${today}</div>
                            <div class="social-icons">
                                <img src="static/img/ic_whatsapp.png">
                                <img src="static/img/ic_instagram.png">
                            </div>
                        </div>
                    </div>
                    <div class="section-title">Cliente</div>
                    <p><strong>NOME:</strong> ${nome} | <strong>CPF/CNPJ:</strong> ${cpfCnpjFormatado}</p>
                    <div class="section-title">Orçamento</div>
                    <div class="budget-table">${desc}</div>
                    <div class="section-title">Observações</div>
                    <p>${obs}</p>
                    <div class="section-title">Formas de Pagamento</div>
                    <div class="payment-options">
                        <div class="payment-option"><strong>À Vista</strong><span class="payment-value">R$ ${valorTotal.toFixed(2)}</span></div>
                        <div class="payment-option"><strong>Cartão (12x)</strong><span class="payment-value">R$ ${valorCartao}</span></div>
                    </div>
                    <div class="pix-info">
                        <img src="static/img/ic_pix.png" class="pix-logo">
                        Chave pix: 13.744.549/0001-32
                    </div>
                </div>`;

            await new Promise(r => setTimeout(r, 800));

            const canvas = await html2canvas(pdfTemplateElement, {
                scale: 2,
                useCORS: true,
                backgroundColor: "#ffffff"
            });

            const imgData = canvas.toDataURL('image/jpeg', 0.95);
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            const w = pdf.internal.pageSize.getWidth();
            const h = (canvas.height * w) / canvas.width;

            pdf.addImage(imgData, 'JPEG', 0, 0, w, h);
            pdf.save(`Orcamento_${nome}.pdf`);

        } catch (error) {
            console.error(error);
            alert('Erro: ' + error.message);
        } finally {
            pdfTemplateElement.innerHTML = '';
            gerarPdfBtn.disabled = false;
            gerarPdfBtn.textContent = 'Gerar PDF';
        }
    });
});
</script>
