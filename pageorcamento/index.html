<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Orçamento Profissional</title>
    <link rel="stylesheet" href="static/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>
    <div class="container">
        <h2>Gerador de Orçamento Profissional</h2>
        <form id="orcamentoForm">
            <fieldset>
                <legend>Detalhes do Cliente</legend>
                <label for="nomeCliente">Nome do Cliente:</label>
                <input type="text" id="nomeCliente" name="nomeCliente" required><br><br>

                <div class="cpf-cnpj-selection">
                    <label><input type="radio" name="docType" value="cpfCnpj" checked> CPF/CNPJ</label>
                    <label><input type="radio" name="docType" value="na"> Não informar</label>
                </div>

                <div id="cpfCnpjInputContainer">
                    <label for="cpfCnpjCliente">CPF/CNPJ:</label>
                    <input type="text" id="cpfCnpjCliente" name="cpfCnpjCliente" maxlength="18" required><br><br>
                </div>
            </fieldset>

            <fieldset>
                <legend>Detalhes do Serviço</legend>
                <label for="descricaoServico">Descrição do Serviço:</label><br>
                <textarea id="descricaoServico" name="descricaoServico" rows="6" required></textarea><br><br>

                <label for="observacoes">Observações adicionais:</label><br>
                <textarea id="observacoes" name="observacoes" rows="4"></textarea><br><br>

                <label for="valorTotal">Valor Total (R$):</label>
                <input type="number" id="valorTotal" name="valorTotal" step="0.01" required><br><br>
            </fieldset>

            <button type="submit" id="gerarPdfBtn">Gerar PDF</button>
        </form>
    </div>

    <div id="pdf-template" style="position: fixed; top: 0; left: 0; width: 800px; opacity: 0; pointer-events: none; z-index: -9999; background: white;"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('orcamentoForm');
            const gerarPdfBtn = document.getElementById('gerarPdfBtn');
            const pdfTemplateElement = document.getElementById('pdf-template');
            
            // Taxas configuráveis
            const PIX_DISCOUNT_RATE = 0.05;
            const CARD_MARKUP_RATE = 0.10;

            const docTypeRadios = document.querySelectorAll('input[name="docType"]');
            const cpfCnpjInputContainer = document.getElementById('cpfCnpjInputContainer');
            const cpfCnpjInput = document.getElementById('cpfCnpjCliente');

            // Alternar exibição de CPF/CNPJ
            docTypeRadios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    if (e.target.value === 'na') {
                        cpfCnpjInputContainer.style.display = 'none';
                        cpfCnpjInput.removeAttribute('required');
                        cpfCnpjInput.value = '';
                    } else {
                        cpfCnpjInputContainer.style.display = 'block';
                        cpfCnpjInput.setAttribute('required', 'required');
                    }
                });
            });

            form.addEventListener('submit', async (event) => {
                event.preventDefault();

                gerarPdfBtn.disabled = true;
                gerarPdfBtn.textContent = 'Processando...';

                try {
                    const { jsPDF } = window.jspdf;
                    
                    // Coleta de dados
                    const nomeCliente = document.getElementById('nomeCliente').value;
                    const cpfCnpjValue = cpfCnpjInput.value || 'Não informado';
                    const descricaoServico = document.getElementById('descricaoServico').value;
                    const observacoes = document.getElementById('observacoes').value || 'Nenhuma observação fornecida.';
                    const valorTotalOriginal = parseFloat(document.getElementById('valorTotal').value);
                    
                    // Cálculos
                    const valorAVista = (valorTotalOriginal * (1 - PIX_DISCOUNT_RATE)).toFixed(2);
                    const valorCartao = (valorTotalOriginal * (1 + CARD_MARKUP_RATE)).toFixed(2);
                    const today = new Date().toLocaleDateString('pt-BR');

                    // Montando o HTML do PDF
                    pdfTemplateElement.innerHTML = `
                    <style>
                        .pdf-content { padding: 40px; font-family: Arial, sans-serif; color: #333; background: white; }
                        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #0056b3; padding-bottom: 20px; }
                        .company-info h1 { font-size: 28px; color: #0056b3; margin: 0; }
                        .company-info p { margin: 2px 0; font-size: 14px; }
                        .meta-info { text-align: right; font-size: 14px; }
                        .section-title { font-weight: bold; margin-top: 25px; background: #f0f0f0; padding: 8px; text-transform: uppercase; font-size: 14px; border-left: 4px solid #0056b3; }
                        .content-text { padding: 10px 5px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; }
                        .payment-grid { display: flex; gap: 15px; margin-top: 20px; }
                        .pay-item { flex: 1; border: 1px solid #ddd; padding: 15px; text-align: center; border-radius: 5px; }
                        .pay-label { font-size: 12px; color: #666; display: block; }
                        .pay-val { font-weight: bold; font-size: 18px; color: #0056b3; display: block; margin-top: 5px; }
                        .pix-highlight { margin-top: 30px; text-align: center; padding: 15px; background: #e7f3ff; border-radius: 8px; font-weight: bold; }
                    </style>
                    <div class="pdf-content">
                        <div class="header">
                            <div class="company-info">
                                <h1>LN CLIMATIZAÇÃO</h1>
                                <p>Elétrica e Ar Condicionado</p>
                                <p>CNPJ: 13.744.549/0001-32</p>
                            </div>
                            <div class="meta-info">
                                <div><strong>Data:</strong> ${today}</div>
                                <div><strong>Validade:</strong> 7 dias</div>
                            </div>
                        </div>

                        <div class="section-title">Dados do Cliente</div>
                        <div class="content-text">
                            <strong>Nome:</strong> ${nomeCliente}<br>
                            <strong>CPF/CNPJ:</strong> ${cpfCnpjValue}
                        </div>

                        <div class="section-title">Descrição dos Serviços</div>
                        <div class="content-text">${descricaoServico}</div>

                        <div class="section-title">Observações</div>
                        <div class="content-text">${observacoes}</div>

                        <div class="section-title">Opções de Pagamento</div>
                        <div class="payment-grid">
                            <div class="pay-item">
                                <span class="pay-label">À Vista (Pix/Dinheiro)</span>
                                <span class="pay-val">R$ ${valorAVista}</span>
                            </div>
                            <div class="pay-item">
                                <span class="pay-label">Parcelado (Padrão)</span>
                                <span class="pay-val">R$ ${valorTotalOriginal.toFixed(2)}</span>
                            </div>
                            <div class="pay-item">
                                <span class="pay-label">Cartão (até 12x)</span>
                                <span class="pay-val">R$ ${valorCartao}</span>
                            </div>
                        </div>

                        <div class="pix-highlight">
                            Chave PIX: 13.744.549/0001-32
                        </div>
                    </div>`;

                    // Aguarda o navegador processar o HTML e CSS injetado
                    await new Promise(resolve => setTimeout(resolve, 800));

                    const canvas = await html2canvas(pdfTemplateElement, {
                        scale: 2, // Aumenta a qualidade da imagem
                        useCORS: true,
                        backgroundColor: "#ffffff",
                        logging: false
                    });

                    const imgData = canvas.toDataURL('image/jpeg', 0.98);
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    
                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = (canvas.height * pdfWidth) / canvas.width;

                    pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
                    pdf.save(`Orcamento_${nomeCliente.replace(/\s+/g, '_')}.pdf`);

                } catch (error) {
                    console.error("Erro na geração:", error);
                    alert('Erro ao gerar o PDF. Tente novamente.');
                } finally {
                    // Limpa o template e restaura o botão
                    pdfTemplateElement.innerHTML = '';
                    gerarPdfBtn.disabled = false;
                    gerarPdfBtn.textContent = 'Gerar PDF';
                }
            });
        });
    </script>
</body>
</html>
